<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2 + pathSegmentsToKeep).join('/') + '/?redirect=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').split('?')[0] +
        (l.search ? '&' + l.search.slice(1) : '')
      );
    </script>
  </head>
  <body>
  </body>
</html>
